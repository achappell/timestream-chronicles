<svg width="1500" height="600" viewBox="0 0 1500 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep Black -->
  <rect width="100%" height="100%" fill="var(--color-vortex-black)"/>
  
  <!-- Stylized Scanlines -->
  <defs>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="1500" y2="0" stroke="#fff" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>
    
    <radialGradient id="vortexGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="var(--color-vortex-black)" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#scanlines)" />
  
  <!-- Geometric Vortex Centers -->
  <circle cx="750" cy="300" r="250" fill="url(#vortexGrad)" />
  
  <!-- Technical Overlay Grid -->
  <g stroke="#fff" stroke-width="1" stroke-opacity="0.2">
    <line x1="0" y1="300" x2="1500" y2="300" />
    <line x1="750" y1="0" x2="750" y2="600" />
    <circle cx="750" cy="300" r="100" fill="none" />
    <circle cx="750" cy="300" r="200" fill="none" stroke-dasharray="10,10" />
  </g>
  
  <!-- Title Text -->
  <text x="750" y="320" font-family="monospace" font-size="48" fill="#fff" text-anchor="middle" font-weight="bold" letter-spacing="15">
    TIMESTREAM CHRONICLES
  </text>
  
  <!-- Technical Readouts -->
  <text x="50" y="50" font-family="monospace" font-size="12" fill="#fff" opacity="0.6">
    CONSOLE ID: TARDIS-MKI-63
  </text>
  <text x="1450" y="50" font-family="monospace" font-size="12" fill="#fff" opacity="0.6" text-anchor="end">
    VORTEX STABILITY: 100%
  </text>
  <text x="50" y="550" font-family="monospace" font-size="12" fill="#fff" opacity="0.6">
    ERA: HARTNELL (1963)
  </text>
  <text x="1450" y="550" font-family="monospace" font-size="12" fill="#fff" opacity="0.6" text-anchor="end">
    ARCHIVE PROTOCOL: ACTIVE
  </text>

  <!-- High-Contrast Frame -->
  <rect x="20" y="20" width="1460" height="560" fill="none" stroke="#fff" stroke-width="2" stroke-opacity="0.3" />
</svg>
